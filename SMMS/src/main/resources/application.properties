spring.config.import=optional:application-local.properties

spring.application.name=SMMS

spring.datasource.url=jdbc:postgresql://localhost:5433/apex
spring.datasource.username=postgres

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.flyway.validate-migration-naming=true


jwt.expiration-ms=3600000

spring.web.server.error.include-message=always
spring.web.server.error.include-binding-errors=always
